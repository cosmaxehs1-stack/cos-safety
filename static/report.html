<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안전 위험요소 분석 리포트 - COSMAX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', 'Segoe UI', -apple-system, sans-serif; background: #fff; color: #333; line-height: 1.7; }
        .wrap { max-width: 1000px; margin: 0 auto; padding: 40px 48px; }

        /* Header */
        .report-header { padding: 0 0 32px; margin-bottom: 40px; }
        .report-header .header-num { font-size: 13px; color: #999; margin-bottom: 4px; }
        .report-header h1 { font-size: 32px; font-weight: 700; color: #000; letter-spacing: -0.5px; line-height: 1.3; }
        .report-header .header-sub { font-size: 20px; color: #C1C6C7; font-weight: 400; margin-top: 2px; }
        .report-header p { color: #999; font-size: 13px; margin-top: 12px; }
        .print-btn { padding: 10px 24px; background: #EA1D22; color: #fff; border: none; border-radius: 2px; cursor: pointer; font-size: 13px; font-weight: 600; float: right; margin-top: -48px; }
        .print-btn:hover { background: #c4181c; }
        .header-line { border: none; border-top: 2px solid #EA1D22; margin-top: 20px; }

        /* Section */
        .section { margin-bottom: 48px; }
        .section-line { border: none; border-top: 1.5px solid #EA1D22; margin-bottom: 20px; }
        .section-title { color: #000; font-size: 22px; font-weight: 700; margin: 0 0 6px; padding: 0; border: none; }
        .section-sub { font-size: 14px; color: #999; margin-bottom: 24px; }

        /* Summary Cards */
        .summary-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; margin-bottom: 28px; }
        .s-card { padding: 20px 16px; text-align: left; border-right: 1px solid #eee; }
        .s-card:last-child { border-right: none; }
        .s-label { font-size: 12px; color: #999; margin-bottom: 6px; font-weight: 500; }
        .s-value { font-size: 32px; font-weight: 700; color: #000; }
        .s-value.red { color: #EA1D22; }
        .s-value.teal, .s-value.green, .s-value.blue { color: #000; }

        /* Chart Box */
        .chart-box { padding: 24px 0; margin-bottom: 20px; }
        .chart-box h3 { font-size: 13px; color: #999; margin-bottom: 16px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 24px; }

        /* Bar Chart */
        .bar-chart { padding: 8px 0; }
        .bar-row { display: flex; align-items: center; margin-bottom: 6px; }
        .bar-label { width: 100px; font-size: 12px; text-align: right; padding-right: 12px; color: #666; }
        .bar-track { flex: 1; height: 20px; background: #f5f5f5; overflow: hidden; }
        .bar-fill { height: 100%; background: #333; }
        .bar-val { width: 40px; text-align: right; font-size: 12px; font-weight: 600; padding-left: 8px; }

        /* Table */
        .rtable { width: 100%; border-collapse: collapse; margin-bottom: 24px; font-size: 13px; }
        .rtable thead th { background: none; color: #999; padding: 10px 12px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #333; }
        .rtable td { padding: 10px 12px; border-bottom: 1px solid #eee; color: #333; }
        .rtable tr:hover { background: #fafafa; }
        .wrap-cell { max-width: 400px; word-break: break-all; }

        /* Grade Tags */
        .grade-tag { display: inline-block; padding: 2px 10px; border-radius: 2px; font-size: 11px; font-weight: 600; color: #fff; }
        .g-A { background: #D4CEC1; color: #333; }
        .g-B { background: #C1C6C7; color: #333; }
        .g-C { background: #c0432b; }
        .g-D { background: #EA1D22; }
        .g-E { background: #EA1D22; }
        .g-F { background: #EA1D22; }
        .g-- { background: #ddd; color: #666; }

        .loading { text-align: center; padding: 80px; color: #999; font-size: 16px; }

        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .wrap { padding: 20px; }
            .print-btn { display: none !important; }
            .section { page-break-inside: avoid; }
            .chart-grid, .chart-box { page-break-inside: avoid; }
            .rtable { page-break-inside: auto; }
            .rtable tr { page-break-inside: avoid; }
        }
    </style>
</head>
<body>
    <div id="report" class="wrap">
        <p class="loading">리포트를 불러오는 중...</p>
    </div>
    <script>
    (async function() {
        // --- Get Data ---
        let data = null;
        try {
            const stored = sessionStorage.getItem("reportData");
            if (stored) {
                data = JSON.parse(stored);
            } else {
                document.getElementById('report').innerHTML = '<p class="loading">대시보드에서 리포트 출력을 클릭해주세요.</p>';
                return;
            }
        } catch (e) {
            document.getElementById('report').innerHTML = '<p class="loading">데이터를 불러올 수 없습니다: ' + e.message + '</p>';
            return;
        }

        if (!data || !data.records || data.records.length === 0) {
            document.getElementById('report').innerHTML = '<p class="loading">표시할 데이터가 없습니다.</p>';
            return;
        }

        const records = data.records;
        const total = data.total;
        const today = new Date().toLocaleDateString('ko-KR');
        function esc(s) { return s ? String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') : ''; }

        // --- Compute Analytics ---
        const gA = data.grade_a, gB = data.grade_b, gC = data.grade_c, gD = data.grade_d;
        const gE = records.filter(r => r.grade_before === 'E' || r.grade_before === 'F').length;

        // Channel stats
        const channelStats = data.channel_stats || {};
        const channelGradeStats = data.channel_grade_stats || {};
        const channelList = Object.entries(channelStats).sort((a, b) => b[1] - a[1]);

        // Company stats
        const companies = Object.entries(data.location_stats)
            .map(([name, g]) => ({
                name,
                total: (g.A || 0) + (g.B || 0) + (g.C || 0) + (g.D || 0) + (g['-'] || 0),
                A: g.A || 0, B: g.B || 0, C: g.C || 0, D: g.D || 0
            }))
            .sort((a, b) => b.total - a.total);
        const maxComp = companies[0]?.total || 1;

        // Weekly stats
        const weeks = Object.entries(data.week_stats).sort((a, b) => a[0].localeCompare(b[0]));

        // Category (disaster_type > process)
        const catMap = {};
        records.forEach(r => {
            const m = r.disaster_type || '기타';
            const s = r.process || '미분류';
            const key = m + '||' + s;
            catMap[key] = (catMap[key] || 0) + 1;
        });
        const cats = Object.entries(catMap)
            .map(([k, c]) => { const [m, s] = k.split('||'); return { m, s, c, p: total ? (c / total * 100).toFixed(1) : '0' }; })
            .sort((a, b) => b.c - a.c);

        // Main category aggregation
        const mainCatMap = {};
        cats.forEach(c => { mainCatMap[c.m] = (mainCatMap[c.m] || 0) + c.c; });
        const mainCats = Object.entries(mainCatMap).sort((a, b) => b[1] - a[1]);

        // High risk items (D/E)
        const highRisk = records.filter(r => r.grade_before === 'D' || r.grade_before === 'E' || r.grade_before === 'F');

        // Repeated risks
        const contentGroups = {};
        records.forEach(r => {
            const c = (r.content_full || '').trim();
            if (!c) return;
            if (!contentGroups[c]) contentGroups[c] = { n: 0, locs: new Set() };
            contentGroups[c].n++;
            if (r.location_group) contentGroups[c].locs.add(r.location_group);
        });
        const repeats = Object.entries(contentGroups)
            .filter(([_, v]) => v.n >= 2)
            .map(([content, v]) => ({ content, count: v.n, location: [...v.locs].join(', ') }))
            .sort((a, b) => b.count - a.count)
            .slice(0, 10);

        // --- Build HTML ---
        let html = '';

        // Header
        html += '<header class="report-header">';
        html += '<h1>안전 위험요소 분석 리포트</h1>';
        html += '<div class="header-sub">COSMAX EHS Dashboard</div>';
        html += '<p>생성일: ' + today + ' &nbsp;|&nbsp; 총 ' + total + '건</p>';
        html += '<hr class="header-line">';
        html += '<button class="print-btn" onclick="window.print()">인쇄 / PDF 저장</button>';
        html += '</header>';

        // Section 1: Summary
        html += '<div class="section">';
        html += '<hr class="section-line"><h2 class="section-title">전체 현황 요약</h2>';
        html += '<div class="section-sub">위험요소 발굴 및 개선 현황</div>';
        html += '<div class="summary-cards">';
        html += '<div class="s-card"><div class="s-label">전체 건수</div><div class="s-value">' + total + '</div></div>';
        html += '<div class="s-card"><div class="s-label">개선 건수</div><div class="s-value">' + data.complete + '</div></div>';
        html += '<div class="s-card"><div class="s-label">미완료 건수</div><div class="s-value red">' + data.incomplete + '</div></div>';
        html += '<div class="s-card"><div class="s-label">개선률</div><div class="s-value">' + data.improvement_rate + '%</div></div>';
        html += '</div></div>';

        // Section 2: Channel Analysis
        html += '<div class="section">';
        html += '<hr class="section-line"><h2 class="section-title">채널별 분석</h2>';
        html += '<div class="section-sub">채널별 위험요소 발굴 현황</div>';
        html += '<div class="chart-grid">';
        html += '<div class="chart-box"><h3>채널별 위험요소 건수</h3><canvas id="c-channel"></canvas></div>';
        html += '<div class="chart-box"><h3>주차별 발굴 현황</h3><canvas id="c-weekly-top"></canvas></div>';
        html += '</div>';
        html += '<table class="rtable"><thead><tr><th>채널</th><th>건수</th><th>비율</th><th>A</th><th>B</th><th>C</th><th>D</th></tr></thead><tbody>';
        channelList.forEach(([ch, cnt]) => {
            const g = channelGradeStats[ch] || {};
            html += '<tr><td>' + esc(ch) + '</td><td>' + cnt + '</td><td>' + (total ? (cnt / total * 100).toFixed(1) : '0') + '%</td>';
            html += '<td>' + (g.A || 0) + '</td><td>' + (g.B || 0) + '</td><td>' + (g.C || 0) + '</td><td>' + (g.D || 0) + '</td></tr>';
        });
        html += '</tbody></table>';

        html += '</div>';

        // Section 3: Company Analysis
        html += '<div class="section">';
        html += '<hr class="section-line"><h2 class="section-title">구분별 위험요소 현황</h2>';
        html += '<div class="section-sub">장소별 위험요소 분포</div>';
        html += '<div class="chart-box"><h3>구분별 위험요소 건수</h3><div class="bar-chart">';
        companies.forEach(c => {
            html += '<div class="bar-row">';
            html += '<div class="bar-label">' + esc(c.name) + '</div>';
            html += '<div class="bar-track"><div class="bar-fill" style="width:' + (c.total / maxComp * 100).toFixed(1) + '%"></div></div>';
            html += '<div class="bar-val">' + c.total + '</div>';
            html += '</div>';
        });
        html += '</div></div>';
        html += '<table class="rtable"><thead><tr><th>구분</th><th>건수</th><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th></tr></thead><tbody>';
        companies.forEach(c => {
            html += '<tr><td>' + esc(c.name) + '</td><td>' + c.total + '</td><td>' + c.A + '</td><td>' + c.B + '</td><td>' + c.C + '</td><td>' + c.D + '</td><td>0</td></tr>';
        });
        html += '</tbody></table>';

        html += '</div>';

        // Section 4: Grade & Weekly
        html += '<div class="section">';
        html += '<hr class="section-line"><h2 class="section-title">위험등급 및 주차별 분석</h2>';
        html += '<div class="section-sub">등급 분포 및 주차별 발굴 추이</div>';
        html += '<div class="chart-grid">';
        html += '<div class="chart-box"><h3>위험등급별 분포</h3><canvas id="c-grade"></canvas></div>';
        html += '<div class="chart-box"><h3>주차별 위험요소 발굴 현황</h3><canvas id="c-weekly"></canvas></div>';
        html += '</div>';
        html += '<div class="chart-box"><h3>구분별 위험등급별 현황</h3><canvas id="c-stacked"></canvas></div>';

        html += '</div>';

        // Section 5: Category Analysis
        html += '<div class="section">';
        html += '<hr class="section-line"><h2 class="section-title">유형별 위험요소 분석</h2>';
        html += '<div class="section-sub">재해유형 및 공정별 분류</div>';
        html += '<div class="chart-grid">';
        html += '<div class="chart-box"><h3>대분류별 위험요소 분포</h3><canvas id="c-catpie"></canvas></div>';
        html += '<div class="chart-box"><h3>세부 위험유형 TOP 10</h3><canvas id="c-cattop"></canvas></div>';
        html += '</div>';
        html += '<table class="rtable"><thead><tr><th>대분류</th><th>중분류</th><th>건수</th><th>비율</th></tr></thead><tbody>';
        cats.forEach(c => {
            html += '<tr><td>' + esc(c.m) + '</td><td>' + esc(c.s) + '</td><td>' + c.c + '</td><td>' + c.p + '%</td></tr>';
        });
        html += '</tbody></table>';

        html += '</div>';

        // Section 6: High Risk Items
        html += '<div class="section">';
        html += '<hr class="section-line"><h2 class="section-title">고위험 항목</h2>';
        html += '<div class="section-sub">D/E/F등급 ' + highRisk.length + '건</div>';
        html += '<table class="rtable"><thead><tr><th>구분</th><th>발견일</th><th>장소</th><th>위험요소 내용</th><th>등급</th><th>점수</th><th>완료</th></tr></thead><tbody>';
        highRisk.forEach(r => {
            html += '<tr>';
            html += '<td>' + esc(r.location_group || '-') + '</td>';
            html += '<td>' + (r.date || '-') + '</td>';
            html += '<td>' + esc(r.location || '-') + '</td>';
            html += '<td class="wrap-cell">' + esc(r.content_full || r.content || '-') + '</td>';
            html += '<td><span class="grade-tag g-' + r.grade_before + '">' + r.grade_before + '</span></td>';
            html += '<td>' + (r.risk_before || '-') + '</td>';
            html += '<td>' + (r.completion || '-') + '</td>';
            html += '</tr>';
        });
        html += '</tbody></table>';

        html += '</div>';

        // Section 7: Repeated Risks
        html += '<div class="section">';
        html += '<hr class="section-line"><h2 class="section-title">반복 출현 위험요소</h2>';
        html += '<div class="section-sub">TOP 10</div>';
        html += '<table class="rtable"><thead><tr><th>위험요소 내용</th><th>반복 횟수</th><th>해당 구분</th></tr></thead><tbody>';
        repeats.forEach(r => {
            html += '<tr>';
            html += '<td class="wrap-cell">' + esc(r.content) + '</td>';
            html += '<td>' + r.count + '회</td>';
            html += '<td>' + esc(r.location) + '</td>';
            html += '</tr>';
        });
        if (repeats.length === 0) {
            html += '<tr><td colspan="3" style="text-align:center;color:#999;padding:20px;">반복 위험요소가 없습니다.</td></tr>';
        }
        html += '</tbody></table>';
        html += '</div>';

        // Render
        document.getElementById('report').innerHTML = html;

        // --- Create Charts ---
        Chart.register(ChartDataLabels);
        Chart.defaults.set('plugins.datalabels', { display: false });
        const COLORS = ['#EA1D22', '#333', '#c0432b', '#888', '#D4CEC1', '#C1C6C7', '#555', '#999', '#EA1D22', '#666'];

        // Channel Bar
        if (channelList.length > 0) {
            new Chart(document.getElementById('c-channel'), {
                type: 'bar',
                data: {
                    labels: channelList.map(c => c[0]),
                    datasets: [{ label: '건수', data: channelList.map(c => c[1]), backgroundColor: channelList.map(function(_, i) { return COLORS[i % COLORS.length]; }), borderRadius: 4 }]
                },
                options: {
                    responsive: true,
                    indexAxis: 'y',
                    plugins: { legend: { display: false }, datalabels: { display: true, anchor: 'end', align: 'right', font: { weight: 'bold' }, color: '#333' } },
                    scales: { x: { beginAtZero: true, grid: { display: false } }, y: { grid: { display: false } } }
                }
            });

            if (weeks.length > 0) {
                const WEEKLY_TARGET = 39;
                new Chart(document.getElementById('c-weekly-top'), {
                    type: 'bar',
                    data: {
                        labels: weeks.map(w => w[0]),
                        datasets: [
                            { label: '주간 발굴', data: weeks.map(w => w[1]), backgroundColor: weeks.map(w => w[1] >= WEEKLY_TARGET ? '#555' : '#C1C6C7'), borderRadius: 4 },
                            { label: '목표 (39건)', data: weeks.map(() => WEEKLY_TARGET), type: 'line', borderColor: '#EA1D22', borderWidth: 2, borderDash: [6, 4], pointRadius: 0, fill: false }
                        ]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { position: 'top' }, datalabels: { display: false } },
                        scales: { x: { grid: { display: false } }, y: { beginAtZero: true, suggestedMax: WEEKLY_TARGET + 10 } }
                    }
                });
            }
        }

        // Grade Pie
        new Chart(document.getElementById('c-grade'), {
            type: 'pie',
            data: {
                labels: ['A등급', 'B등급', 'C등급', 'D등급'],
                datasets: [{
                    data: [gA, gB, gC, gD],
                    backgroundColor: ['#D4CEC1', '#C1C6C7', '#c0432b', '#EA1D22'],
                    borderWidth: 2, borderColor: '#fff'
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'bottom' },
                    datalabels: {
                        display: true, color: '#fff',
                        font: { weight: 'bold', size: 14 },
                        formatter: function(v, ctx) {
                            var sum = ctx.dataset.data.reduce(function(a, b) { return a + b; }, 0);
                            return sum ? Math.round(v / sum * 100) + '%' : '';
                        }
                    }
                }
            }
        });

        // Weekly Bar
        if (weeks.length > 0) {
            new Chart(document.getElementById('c-weekly'), {
                type: 'bar',
                data: {
                    labels: weeks.map(w => w[0]),
                    datasets: [{ label: '발굴 건수', data: weeks.map(w => w[1]), backgroundColor: '#888', borderRadius: 4 }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false },
                        datalabels: { display: true, anchor: 'end', align: 'top', font: { weight: 'bold' }, color: '#333' }
                    },
                    scales: { x: { grid: { display: false } }, y: { beginAtZero: true } }
                }
            });
        }

        // Company Stacked Bar
        new Chart(document.getElementById('c-stacked'), {
            type: 'bar',
            data: {
                labels: companies.map(c => c.name),
                datasets: [
                    { label: 'A등급', data: companies.map(c => c.A), backgroundColor: '#D4CEC1', borderRadius: 2 },
                    { label: 'B등급', data: companies.map(c => c.B), backgroundColor: '#C1C6C7', borderRadius: 2 },
                    { label: 'C등급', data: companies.map(c => c.C), backgroundColor: '#c0432b', borderRadius: 2 },
                    { label: 'D등급', data: companies.map(c => c.D), backgroundColor: '#EA1D22', borderRadius: 2 }
                ]
            },
            options: {
                responsive: true,
                plugins: { legend: { position: 'top' }, datalabels: { display: false } },
                scales: { x: { stacked: true, grid: { display: false } }, y: { stacked: true, beginAtZero: true } }
            }
        });

        // Category Pie
        new Chart(document.getElementById('c-catpie'), {
            type: 'pie',
            data: {
                labels: mainCats.map(c => c[0]),
                datasets: [{
                    data: mainCats.map(c => c[1]),
                    backgroundColor: mainCats.map(function(_, i) { return COLORS[i % COLORS.length]; }),
                    borderWidth: 2, borderColor: '#fff'
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'bottom', labels: { font: { size: 11 } } },
                    datalabels: {
                        display: true, color: '#fff',
                        font: { weight: 'bold', size: 12 },
                        formatter: function(v, ctx) {
                            var sum = ctx.dataset.data.reduce(function(a, b) { return a + b; }, 0);
                            var pct = sum ? Math.round(v / sum * 100) : 0;
                            return pct >= 5 ? pct + '%' : '';
                        }
                    }
                }
            }
        });

        // Category TOP 10 Horizontal Bar
        var top10 = cats.slice(0, 10);
        new Chart(document.getElementById('c-cattop'), {
            type: 'bar',
            data: {
                labels: top10.map(c => c.m + ' > ' + c.s),
                datasets: [{
                    label: '건수',
                    data: top10.map(c => c.c),
                    backgroundColor: top10.map(function(_, i) { return COLORS[i % COLORS.length]; }),
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                indexAxis: 'y',
                plugins: {
                    legend: { display: false },
